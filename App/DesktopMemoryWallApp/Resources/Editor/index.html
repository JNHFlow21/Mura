<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Desktop Memory Wall Canvas</title>
  <style>
    @font-face {
      font-family: "LXGW WenKai";
      src: url("LXGWWenKai-Regular.ttf") format("truetype"),
           url("../Fonts/LXGWWenKai-Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    :root {
      color-scheme: light;
      --paper: #fff8df;
      --chrome: rgba(255, 248, 223, .86);
      --button-surface: rgba(255, 248, 223, .92);
      --ink: #111827;
      --muted: rgba(17, 24, 39, .62);
      --panel: rgba(255, 255, 255, .82);
      --line: rgba(17, 24, 39, .18);
      --accent: #b91c1c;
      --ui-font: "LXGW WenKai", "STKaiti", "Kaiti SC", "PingFang SC", cursive;
      font-family: var(--ui-font);
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: var(--paper); color: var(--ink); }
    body { font-family: var(--ui-font); }
    #app { width: 100vw; height: 100vh; display: grid; grid-template-rows: auto 1fr; background: #f7f0dc; }
    #toolbar {
      height: 54px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--chrome);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(16px);
      user-select: none;
    }
    .brand { font: 15px/1.1 var(--ui-font); color: var(--muted); margin: 0 6px 0 4px; white-space: nowrap; }
    .spacer { flex: 1; }
    button {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--button-surface);
      color: var(--ink);
      height: 36px;
      padding: 0 12px;
      font: 14px/1 var(--ui-font);
      font-weight: 400;
      cursor: pointer;
    }
    button.active { background: #111827; color: #fff8df; border-color: #111827; }
    button.primary { background: #111827; color: #fff8df; border-color: #111827; }
    button.ghost { background: transparent; }
    button.toolbarAction {
      background: transparent;
      border-color: var(--line);
      font-weight: 400;
      min-width: 92px;
    }
    button.toolButton,
    button.iconButton {
      width: 48px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      background: var(--button-surface);
    }
    .toolGlyph {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      font: 700 23px/1 var(--ui-font);
    }
    .toolbarIcon {
      width: 26px;
      height: 26px;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.25;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .historyIcon {
      transform: translateY(-2px);
    }
    button.toolButton.active,
    button.iconButton.active {
      background: #111827;
      color: #fff8df;
      border-color: #111827;
    }
    #stageWrap {
      position: relative;
      overflow: hidden;
      padding: 22px 22px 22px 236px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #canvasBox {
      position: relative;
      background: var(--paper);
      box-shadow: 0 20px 80px rgba(17, 24, 39, .18), 0 0 0 1px rgba(17,24,39,.10);
      border-radius: 3px;
      transform-origin: top left;
    }
    #displayRail {
      position: absolute;
      left: 24px;
      top: 24px;
      bottom: 24px;
      width: 168px;
      z-index: 4;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 4px 18px 4px 4px;
      border-right: 1px solid rgba(17,24,39,.10);
      overflow: visible;
      pointer-events: none;
      scrollbar-width: none;
    }
    #displayRail::-webkit-scrollbar { display: none; }
    .displayCard {
      pointer-events: auto;
      flex: 0 0 auto;
      width: 142px;
      height: auto;
      border: 0;
      border-radius: 18px;
      padding: 0;
      color: var(--ink);
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
      cursor: pointer;
      text-align: left;
      transition: transform .14s ease;
    }
    .displayCard:hover { transform: translateX(3px); background: transparent; }
    .displayCard.selected {
      border-color: transparent;
      box-shadow: none;
    }
    .displayCard.selected .displayThumb {
      border: 4px solid rgba(17,24,39,.76);
      box-shadow:
        -18px 6px 44px rgba(17,24,39,.14),
        18px 10px 44px rgba(17,24,39,.13),
        0 18px 46px rgba(17,24,39,.20),
        inset 0 0 0 1px rgba(17,24,39,.10);
    }
    .displayThumb {
      width: 100%;
      min-height: 54px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(255,248,223,.98), rgba(247,240,220,.86));
      border: 1px solid rgba(17,24,39,.14);
      box-shadow:
        -14px 6px 36px rgba(17, 24, 39, .08),
        14px 12px 38px rgba(17, 24, 39, .12),
        0 14px 38px rgba(17, 24, 39, .12),
        inset 0 0 0 1px rgba(255,255,255,.62);
      position: relative;
      overflow: hidden;
    }
    .displayThumb::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 8px;
      border: 1px solid rgba(17,24,39,.12);
      opacity: .72;
    }
    .displayMeta { margin-top: 8px; color: var(--ink); font: 700 12px/1.1 var(--ui-font); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .displaySize { margin-top: 3px; font: 10px/1 var(--ui-font); color: rgba(17,24,39,.56); }
    .displayBadge {
      position: absolute;
      right: 7px;
      top: 7px;
      height: 18px;
      min-width: 18px;
      padding: 0 5px;
      border-radius: 999px;
      display: inline-grid;
      place-items: center;
      background: #111827;
      color: #fff8df;
      font: 700 10px/1 var(--ui-font);
    }
    canvas { display: block; width: 100%; height: 100%; cursor: crosshair; outline: none; }
    #textEditor {
      position: absolute;
      z-index: 5;
      display: none;
      min-width: 180px;
      min-height: 78px;
      resize: both;
      overflow: hidden;
      background: rgba(255, 248, 223, .22);
      border: 2px dashed rgba(17,24,39,.36);
      border-radius: 18px;
      box-shadow: 0 14px 36px rgba(17,24,39,.08), 0 0 0 6px rgba(255,248,223,.38);
      color: var(--ink);
      outline: none;
      padding: 0;
      font-family: var(--ui-font);
      line-height: 1.18;
      white-space: pre;
    }
    #status { margin-left: 8px; color: var(--muted); font: 13px var(--ui-font); min-width: 120px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <span class="brand">Memory Wall</span>
      <button data-tool="select" class="toolButton active" title="选择" aria-label="选择">
        <svg class="toolbarIcon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8 12.5V6.8a1.4 1.4 0 0 1 2.8 0v5.1" />
          <path d="M10.8 11.8V5.4a1.4 1.4 0 0 1 2.8 0v6.4" />
          <path d="M13.6 12V7a1.4 1.4 0 0 1 2.8 0v6" />
          <path d="M16.4 13.2V9.4a1.35 1.35 0 0 1 2.7 0v5.2c0 4.1-2.4 6.9-6.2 6.9h-1.2c-2.4 0-4.3-1-5.5-3l-2.1-3.6a1.45 1.45 0 0 1 2.5-1.5L8 15.2" />
        </svg>
      </button>
      <button data-tool="text" class="toolButton" title="文字" aria-label="文字"><span class="toolGlyph" aria-hidden="true">T</span></button>
      <button data-tool="pen" class="toolButton" title="画笔" aria-label="画笔">
        <svg class="toolbarIcon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 20l4.5-1.2L18.6 8.7a2.2 2.2 0 0 0-3.1-3.1L5.4 15.7 4 20Z" />
          <path d="M13.8 7.3l2.9 2.9" />
          <path d="M4 20h5" />
        </svg>
      </button>
      <button data-tool="eraser" class="toolButton" title="橡皮" aria-label="橡皮">
        <svg class="toolbarIcon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4.5 15.5 13 7a2.8 2.8 0 0 1 4 0l2 2a2.8 2.8 0 0 1 0 4l-6.5 6.5H8.5l-4-4Z" />
          <path d="M11.6 8.4 17.6 14.4" />
          <path d="M8.5 19.5H21" />
        </svg>
      </button>
      <button id="undo" class="iconButton" title="撤销" aria-label="撤销">
        <svg class="toolbarIcon historyIcon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M9 7 5 11l4 4" />
          <path d="M5 11h10a5 5 0 0 1 0 10h-4" />
        </svg>
      </button>
      <button id="redo" class="iconButton" title="重做" aria-label="重做">
        <svg class="toolbarIcon historyIcon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 7l4 4-4 4" />
          <path d="M19 11H9a5 5 0 0 0 0 10h4" />
        </svg>
      </button>
      <span id="status">字体加载中…</span>
      <span class="spacer"></span>
      <button id="newCanvas" class="toolbarAction">新建画布</button>
      <button id="syncDisplays" class="toolbarAction">多屏同步</button>
      <button id="cancel" class="ghost">取消</button>
      <button id="save" class="primary">保存到桌面</button>
    </div>
    <div id="stageWrap">
      <div id="displayRail" aria-label="屏幕列表"></div>
      <div id="canvasBox">
        <canvas id="scene"></canvas>
        <textarea id="textEditor" spellcheck="false" wrap="off"></textarea>
      </div>
    </div>
  </div>
  <script>
    const DEFAULT_WIDTH = 1920;
    const DEFAULT_HEIGHT = 1080;
    const DEFAULT_BG = '#fff8df';
    const DEFAULT_INK = '#111827';
    const FONT = 'LXGW WenKai';
    const STAGE_PADDING_LEFT = 236;
    const STAGE_PADDING_RIGHT = 22;
    const STAGE_PADDING_Y = 22;
    const canvas = document.getElementById('scene');
    canvas.tabIndex = 0;
    const ctx = canvas.getContext('2d');
    const box = document.getElementById('canvasBox');
    const wrap = document.getElementById('stageWrap');
    const displayRail = document.getElementById('displayRail');
    const textEditor = document.getElementById('textEditor');
    const statusEl = document.getElementById('status');
    const newCanvasButton = document.getElementById('newCanvas');
    const syncButton = document.getElementById('syncDisplays');
    let tool = 'select';
    let board = blankBoard();
    let displays = [board.metadata.displayProfile];
    let selectedDisplayID = board.metadata.displayProfile.id;
    let boardsByDisplayID = { [selectedDisplayID]: clone(board) };
    let syncEnabled = false;
    let selectedId = null;
    let drawing = false;
    let dragging = false;
    let dragOffset = { x: 0, y: 0 };
    let currentStroke = null;
    let editorElementId = null;
    let suppressLoad = false;
    const undoStack = [];
    const redoStack = [];

    function uuid() { return crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + '-' + Math.random().toString(16).slice(2); }
    function nowISO() { return new Date().toISOString(); }
    function blankBoard(display = null) {
      const profile = display || { id: 'main', name: 'Main Display', width: DEFAULT_WIDTH, height: DEFAULT_HEIGHT, scale: 1, isMain: true };
      return {
        id: uuid(), schemaVersion: 2,
        metadata: { title: 'Desktop Memory Wall', createdAt: nowISO(), updatedAt: nowISO(), activeTemplateID: null, displayProfile: profile },
        canvasWidth: Number(profile.width || DEFAULT_WIDTH), canvasHeight: Number(profile.height || DEFAULT_HEIGHT), backgroundColor: DEFAULT_BG,
        elements: [], appState: { viewBackgroundColor: DEFAULT_BG, currentItemFontFamily: FONT, theme: 'light' }, files: {}, rawExcalidraw: { type: 'desktop-memory-wall-canvas', version: 2 }
      };
    }
    function normalizeBoard(input) {
      const profile = input?.metadata?.displayProfile || {};
      const width = Number(input?.canvasWidth || profile.width || DEFAULT_WIDTH);
      const height = Number(input?.canvasHeight || profile.height || DEFAULT_HEIGHT);
      return {
        ...blankBoard(), ...input,
        canvasWidth: width, canvasHeight: height,
        backgroundColor: input?.backgroundColor || input?.appState?.viewBackgroundColor || DEFAULT_BG,
        appState: { viewBackgroundColor: input?.backgroundColor || input?.appState?.viewBackgroundColor || DEFAULT_BG, currentItemFontFamily: FONT, theme: 'light', ...(input?.appState || {}) },
        metadata: { ...blankBoard().metadata, ...(input?.metadata || {}), activeTemplateID: null, displayProfile: { id: 'main', name: 'Main Display', width, height, scale: 1, isMain: true, ...(profile || {}) } },
        elements: Array.isArray(input?.elements) ? input.elements : [],
        files: input?.files || {}, rawExcalidraw: input?.rawExcalidraw || { type: 'desktop-memory-wall-canvas', version: 2 }
      };
    }
    function clone(value) { return JSON.parse(JSON.stringify(value)); }
    function displayByID(displayID) { return displays.find(display => display.id === displayID) || displays[0] || board.metadata.displayProfile; }
    function boardForDisplay(display) {
      return normalizeBoard(boardsByDisplayID[display.id] || blankBoard(display));
    }
    function renderDisplayRail() {
      if (!displayRail) return;
      displayRail.innerHTML = '';
      displays.forEach((display, index) => {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'displayCard' + (display.id === selectedDisplayID ? ' selected' : '');
        card.title = `${display.name} ${display.width}×${display.height}`;
        card.setAttribute('aria-label', `选择屏幕 ${display.name}`);
        const thumb = document.createElement('div');
        thumb.className = 'displayThumb';
        const ratio = Math.max(.62, Math.min(1.78, Number(display.width || DEFAULT_WIDTH) / Number(display.height || DEFAULT_HEIGHT)));
        thumb.style.aspectRatio = String(ratio);
        const badge = document.createElement('span');
        badge.className = 'displayBadge';
        badge.textContent = String(index + 1);
        thumb.appendChild(badge);
        const name = document.createElement('div');
        name.className = 'displayMeta';
        name.textContent = display.name || `屏幕 ${index + 1}`;
        const size = document.createElement('div');
        size.className = 'displaySize';
        size.textContent = `${display.width}×${display.height}`;
        card.appendChild(thumb);
        card.appendChild(name);
        card.appendChild(size);
        card.addEventListener('click', () => switchDisplay(display.id));
        displayRail.appendChild(card);
      });
    }
    function switchDisplay(displayID) {
      if (!displayID || displayID === selectedDisplayID) return;
      commitTextEditor();
      boardsByDisplayID[selectedDisplayID] = clone(board);
      selectedDisplayID = displayID;
      board = boardForDisplay(displayByID(displayID));
      selectedId = null;
      editorElementId = null;
      textEditor.style.display = 'none';
      undoStack.length = 0;
      redoStack.length = 0;
      syncEnabled = false;
      statusEl.textContent = `${displayByID(displayID).name || '屏幕'} ${board.canvasWidth}×${board.canvasHeight}`;
      renderDisplayRail();
      resizeCanvas();
      notifySelectedDisplayChanged();
    }
    function retargetBoardToDisplay(source, display) {
      const next = normalizeBoard(clone(source));
      const oldWidth = Math.max(1, Number(next.canvasWidth || DEFAULT_WIDTH));
      const oldHeight = Math.max(1, Number(next.canvasHeight || DEFAULT_HEIGHT));
      const newWidth = Number(display.width || DEFAULT_WIDTH);
      const newHeight = Number(display.height || DEFAULT_HEIGHT);
      const scaleX = newWidth / oldWidth;
      const scaleY = newHeight / oldHeight;
      next.id = uuid();
      next.canvasWidth = newWidth;
      next.canvasHeight = newHeight;
      next.metadata = { ...(next.metadata || {}), updatedAt: nowISO(), activeTemplateID: null, displayProfile: display };
      next.elements = (next.elements || []).map(element => {
        const scaled = { ...element, x: element.x * scaleX, y: element.y * scaleY, width: element.width * scaleX, height: element.height * scaleY };
        const points = scaled.extra?.points;
        if (Array.isArray(points)) {
          scaled.extra = { ...(scaled.extra || {}), points: points.map(point => ({ x: Number(point.x || 0) * scaleX, y: Number(point.y || 0) * scaleY })) };
        }
        return scaled;
      });
      next.appState = { ...(next.appState || {}), viewBackgroundColor: next.backgroundColor || DEFAULT_BG, currentItemFontFamily: FONT, theme: 'light' };
      return next;
    }
    function syncDisplaysFromSelected() {
      commitTextEditor();
      boardsByDisplayID[selectedDisplayID] = clone(board);
      const source = clone(board);
      displays.forEach(display => {
        boardsByDisplayID[display.id] = display.id === selectedDisplayID ? clone(source) : retargetBoardToDisplay(source, display);
      });
      board = normalizeBoard(boardsByDisplayID[selectedDisplayID]);
      syncEnabled = true;
      statusEl.textContent = `已同步到 ${Math.max(0, displays.length - 1)} 块屏幕`;
      renderDisplayRail();
      resizeCanvas();
      notifySelectedDisplayChanged();
    }
    function newCanvasForSelectedDisplay() {
      commitTextEditor();
      pushUndo();
      const display = displayByID(selectedDisplayID);
      board = blankBoard(display);
      boardsByDisplayID[selectedDisplayID] = clone(board);
      selectedId = null;
      editorElementId = null;
      textEditor.style.display = 'none';
      syncEnabled = false;
      statusEl.textContent = `已新建 ${display?.name || '当前屏幕'} 画布`;
      renderDisplayRail();
      resizeCanvas();
      notifySelectedDisplayChanged();
    }
    function pushUndo() { undoStack.push(clone(board)); if (undoStack.length > 80) undoStack.shift(); redoStack.length = 0; }
    function setTool(next) { commitTextEditor(); tool = next; document.querySelectorAll('[data-tool]').forEach(btn => btn.classList.toggle('active', btn.dataset.tool === tool)); canvas.style.cursor = tool === 'select' ? 'default' : tool === 'text' ? 'text' : 'crosshair'; }
    function post(kind, payload = {}, includeBoard = true, extra = {}) {
      const message = { kind, payload, ...extra };
      if (includeBoard) message.board = board;
      window.webkit?.messageHandlers?.memoryWall?.postMessage(JSON.stringify(message));
    }
    function notifySelectedDisplayChanged() {
      post('boardChanged', { selectedDisplayID, displayCount: displays.length }, false);
    }
    function signalChanged() {
      board.metadata.updatedAt = nowISO();
      boardsByDisplayID[selectedDisplayID] = clone(board);
      renderDisplayRail();
      notifySelectedDisplayChanged();
    }
    function resizeCanvas() {
      const availableW = Math.max(480, wrap.clientWidth - STAGE_PADDING_LEFT - STAGE_PADDING_RIGHT);
      const availableH = Math.max(320, wrap.clientHeight - STAGE_PADDING_Y * 2);
      const scale = Math.min(availableW / board.canvasWidth, availableH / board.canvasHeight, 1);
      const cssW = Math.max(1, Math.round(board.canvasWidth * scale));
      const cssH = Math.max(1, Math.round(board.canvasHeight * scale));
      box.style.width = cssW + 'px'; box.style.height = cssH + 'px';
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(cssW * dpr); canvas.height = Math.round(cssH * dpr);
      canvas.style.width = cssW + 'px'; canvas.style.height = cssH + 'px';
      ctx.setTransform(dpr * scale, 0, 0, dpr * scale, 0, 0);
      autoSizeTextEditor();
      render();
    }
    function pointerToBoard(event) {
      const rect = canvas.getBoundingClientRect();
      return { x: (event.clientX - rect.left) * board.canvasWidth / rect.width, y: (event.clientY - rect.top) * board.canvasHeight / rect.height };
    }
    function boardToCSS(point) {
      const rect = canvas.getBoundingClientRect();
      return { x: point.x * rect.width / board.canvasWidth, y: point.y * rect.height / board.canvasHeight };
    }
    function textLines(text) { return String(text || '').split('\n'); }
    function autoSizeTextEditor() {
      if (!editorElementId || textEditor.style.display === 'none') return;
      const element = board.elements.find(e => e.id === editorElementId);
      if (!element) return;
      const scaleX = canvas.getBoundingClientRect().width / board.canvasWidth;
      const minWidth = Math.max(180, (element.width || 760) * scaleX);
      textEditor.style.width = 'auto';
      textEditor.style.height = 'auto';
      const desiredWidth = Math.ceil(textEditor.scrollWidth + 4);
      const desiredHeight = Math.ceil(textEditor.scrollHeight + 4);
      textEditor.style.width = Math.max(minWidth, desiredWidth) + 'px';
      textEditor.style.height = Math.max(78, desiredHeight) + 'px';
    }
    function drawTextElement(target, element) {
      target.save();
      target.fillStyle = element.strokeColor || DEFAULT_INK;
      target.font = `${element.fontSize || 92}px "${FONT}", "Kaiti SC", cursive`;
      target.textBaseline = 'top';
      target.textAlign = 'left';
      const lineHeight = (element.fontSize || 92) * 1.18;
      textLines(element.text).forEach((line, index) => target.fillText(line, element.x, element.y + index * lineHeight));
      target.restore();
    }
    function drawStrokeElement(target, element) {
      const points = element.extra?.points || [];
      if (!points.length) return;
      target.save();
      target.strokeStyle = element.strokeColor || DEFAULT_INK;
      target.lineWidth = element.fontSize || 8;
      target.lineCap = 'round'; target.lineJoin = 'round';
      target.beginPath();
      target.moveTo(points[0].x, points[0].y);
      points.slice(1).forEach(point => target.lineTo(point.x, point.y));
      target.stroke();
      target.restore();
    }
    function render(target = ctx) {
      target.save();
      target.fillStyle = board.backgroundColor || DEFAULT_BG;
      target.fillRect(0, 0, board.canvasWidth, board.canvasHeight);
      for (const element of board.elements) {
        if (target === ctx && editorElementId === element.id) continue;
        if (element.type === 'text') drawTextElement(target, element);
        if (element.type === 'freedraw' || element.type === 'line' || element.type === 'arrow') drawStrokeElement(target, element);
        if (selectedId === element.id && target === ctx) drawSelection(target, element);
      }
      target.restore();
    }
    function drawSelection(target, element) {
      target.save(); target.strokeStyle = 'rgba(17,24,39,.42)'; target.lineWidth = 2; target.setLineDash([12, 10]);
      const x = element.x - 10;
      const y = element.y - 10;
      const width = Math.max(34, element.width + 20);
      const height = Math.max(34, element.height + 20);
      if (typeof target.roundRect === 'function') {
        target.beginPath();
        target.roundRect(x, y, width, height, 18);
        target.stroke();
      } else {
        target.strokeRect(x, y, width, height);
      }
      target.restore();
    }
    function distanceToSegment(point, start, end) {
      const dx = end.x - start.x, dy = end.y - start.y;
      const lengthSquared = dx * dx + dy * dy;
      if (lengthSquared === 0) return Math.hypot(point.x - start.x, point.y - start.y);
      const t = Math.max(0, Math.min(1, ((point.x - start.x) * dx + (point.y - start.y) * dy) / lengthSquared));
      return Math.hypot(point.x - (start.x + t * dx), point.y - (start.y + t * dy));
    }
    function strokeContainsPoint(point, points, tolerance) {
      if (!points.length) return false;
      if (points.length === 1) return Math.hypot(point.x - points[0].x, point.y - points[0].y) <= tolerance;
      for (let index = 1; index < points.length; index += 1) {
        if (distanceToSegment(point, points[index - 1], points[index]) <= tolerance) return true;
      }
      return false;
    }
    function inBox(point, element, pad = 0) {
      return point.x >= element.x - pad && point.x <= element.x + element.width + pad && point.y >= element.y - pad && point.y <= element.y + element.height + pad;
    }
    function hitTest(point, mode = 'select') {
      const strokeTolerance = mode === 'eraser' ? 56 : 34;
      const textPad = mode === 'eraser' ? 24 : 12;
      for (let i = board.elements.length - 1; i >= 0; i--) {
        const e = board.elements[i];
        if (e.type === 'text' && inBox(point, e, textPad)) return e;
        const pts = e.extra?.points || [];
        if (pts.length && strokeContainsPoint(point, pts, Math.max(strokeTolerance, (e.fontSize || 8) * 3))) return e;
        if (!pts.length && e.type !== 'text' && inBox(point, e, strokeTolerance)) return e;
      }
      return null;
    }
    function bounds(points) {
      const xs = points.map(p => p.x), ys = points.map(p => p.y);
      const minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
      return { x: minX, y: minY, width: Math.max(1, maxX - minX), height: Math.max(1, maxY - minY) };
    }
    function startTextEditor(point, existing = null) {
      commitTextEditor();
      pushUndo();
      const element = existing || { id: uuid(), type: 'text', x: point.x, y: point.y, width: 760, height: 130, text: '', fontSize: 92, strokeColor: DEFAULT_INK, backgroundColor: 'transparent', roughness: 1, extra: {} };
      if (!existing) board.elements.push(element);
      selectedId = element.id; editorElementId = element.id;
      const css = boardToCSS({ x: element.x, y: element.y });
      const scaleX = canvas.getBoundingClientRect().width / board.canvasWidth;
      textEditor.style.display = 'block';
      textEditor.style.left = css.x + 'px'; textEditor.style.top = css.y + 'px';
      textEditor.style.width = Math.max(180, element.width * scaleX) + 'px';
      textEditor.style.height = Math.max(78, element.height * scaleX) + 'px';
      textEditor.style.fontSize = Math.max(20, element.fontSize * scaleX) + 'px';
      textEditor.value = element.text || '';
      autoSizeTextEditor();
      requestAnimationFrame(() => {
        textEditor.focus({ preventScroll: true });
        textEditor.setSelectionRange(textEditor.value.length, textEditor.value.length);
        autoSizeTextEditor();
      });
      render();
    }
    function commitTextEditor() {
      if (!editorElementId) return;
      const element = board.elements.find(e => e.id === editorElementId);
      if (element) {
        const rect = textEditor.getBoundingClientRect();
        const canvasRect = canvas.getBoundingClientRect();
        element.text = textEditor.value;
        element.width = rect.width * board.canvasWidth / canvasRect.width;
        element.height = rect.height * board.canvasHeight / canvasRect.height;
        if (!element.text.trim()) board.elements = board.elements.filter(e => e.id !== element.id);
      }
      editorElementId = null; textEditor.style.display = 'none'; signalChanged(); render();
    }
    function deleteSelected() {
      if (!selectedId) return false;
      pushUndo();
      board.elements = board.elements.filter(e => e.id !== selectedId);
      selectedId = null;
      signalChanged();
      render();
      statusEl.textContent = '已删除';
      return true;
    }
    canvas.addEventListener('pointerdown', event => {
      const point = pointerToBoard(event);
      if (tool === 'text') { event.preventDefault(); event.stopPropagation(); startTextEditor(point); return; }
      canvas.focus({ preventScroll: true });
      canvas.setPointerCapture(event.pointerId);
      const hit = hitTest(point, tool === 'eraser' ? 'eraser' : 'select'); selectedId = hit?.id || null;
      if (tool === 'eraser') { if (hit) { pushUndo(); board.elements = board.elements.filter(e => e.id !== hit.id); selectedId = null; signalChanged(); statusEl.textContent = '已擦除'; } render(); return; }
      if (tool === 'pen') { pushUndo(); drawing = true; currentStroke = { id: uuid(), type: 'freedraw', x: point.x, y: point.y, width: 1, height: 1, text: '', fontSize: 8, strokeColor: DEFAULT_INK, backgroundColor: 'transparent', roughness: 1, extra: { points: [point] } }; board.elements.push(currentStroke); render(); return; }
      if (tool === 'select' && hit) { pushUndo(); dragging = true; dragOffset = { x: point.x - hit.x, y: point.y - hit.y }; }
      render();
    });
    canvas.addEventListener('pointermove', event => {
      const point = pointerToBoard(event);
      if (drawing && currentStroke) { currentStroke.extra.points.push(point); Object.assign(currentStroke, bounds(currentStroke.extra.points)); render(); }
      if (dragging && selectedId) {
        const element = board.elements.find(e => e.id === selectedId);
        if (element) {
          const oldX = element.x, oldY = element.y;
          element.x = Math.max(0, Math.min(board.canvasWidth - element.width, point.x - dragOffset.x));
          element.y = Math.max(0, Math.min(board.canvasHeight - element.height, point.y - dragOffset.y));
          const dx = element.x - oldX, dy = element.y - oldY;
          if (element.extra?.points) element.extra.points = element.extra.points.map(p => ({ x: p.x + dx, y: p.y + dy }));
          render();
        }
      }
    });
    canvas.addEventListener('pointerup', () => { if (drawing || dragging) signalChanged(); drawing = false; dragging = false; currentStroke = null; });
    canvas.addEventListener('dblclick', event => { const hit = hitTest(pointerToBoard(event)); if (hit?.type === 'text') startTextEditor({ x: hit.x, y: hit.y }, hit); });
    textEditor.addEventListener('input', autoSizeTextEditor);
    textEditor.addEventListener('keydown', event => { if ((event.metaKey || event.ctrlKey) && event.key === 'Enter') commitTextEditor(); event.stopPropagation(); });
    textEditor.addEventListener('blur', commitTextEditor);
    function isDeleteKey(event) {
      return event.key === 'Delete' || event.key === 'Backspace' || event.keyCode === 8 || event.keyCode === 46;
    }
    document.addEventListener('keydown', event => {
      if (document.activeElement === textEditor) return;
      if (isDeleteKey(event) && selectedId) { event.preventDefault(); event.stopPropagation(); deleteSelected(); return; }
      if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 'z') { event.shiftKey ? redo() : undo(); }
      if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 's') { event.preventDefault(); save(); }
    }, true);
    function undo() { commitTextEditor(); const previous = undoStack.pop(); if (!previous) { statusEl.textContent = '没有可撤销内容'; return; } redoStack.push(clone(board)); board = normalizeBoard(previous); selectedId = null; signalChanged(); statusEl.textContent = '已撤销'; resizeCanvas(); }
    function redo() { commitTextEditor(); const next = redoStack.pop(); if (!next) { statusEl.textContent = '没有可重做内容'; return; } undoStack.push(clone(board)); board = normalizeBoard(next); selectedId = null; signalChanged(); statusEl.textContent = '已重做'; resizeCanvas(); }
    function renderBoardDataURL(boardDocument) {
      const output = document.createElement('canvas');
      output.width = boardDocument.canvasWidth;
      output.height = boardDocument.canvasHeight;
      const out = output.getContext('2d');
      out.fillStyle = boardDocument.backgroundColor || DEFAULT_BG;
      out.fillRect(0, 0, output.width, output.height);
      for (const element of boardDocument.elements || []) {
        if (element.type === 'text') drawTextElement(out, element);
        if (element.type === 'freedraw' || element.type === 'line' || element.type === 'arrow') drawStrokeElement(out, element);
      }
      return output.toDataURL('image/png');
    }
    async function exportPNG() {
      commitTextEditor();
      await document.fonts.ready;
      return renderBoardDataURL(board);
    }
    async function exportAllDisplays() {
      commitTextEditor();
      boardsByDisplayID[selectedDisplayID] = clone(board);
      await document.fonts.ready;
      return displays.map(display => {
        const displayBoard = boardForDisplay(display);
        boardsByDisplayID[display.id] = clone(displayBoard);
        return {
          displayID: display.id,
          board: displayBoard,
          pngDataURL: renderBoardDataURL(displayBoard),
          width: displayBoard.canvasWidth,
          height: displayBoard.canvasHeight
        };
      });
    }
    async function save() {
      try {
        const displayExports = await exportAllDisplays();
        const selectedExport = displayExports.find(item => item.displayID === selectedDisplayID) || displayExports[0];
        if (selectedExport) board = normalizeBoard(selectedExport.board);
        post('exportPNG', { selectedDisplayID, syncEnabled, displayCount: displayExports.length, fontReady: true, pngDataURL: selectedExport?.pngDataURL || '', width: board.canvasWidth, height: board.canvasHeight }, true, { displayExports });
        statusEl.textContent = '已发送保存';
      } catch (error) {
        post('error', { message: String(error) }, false);
        statusEl.textContent = '保存失败';
      }
    }
    function loadBoard(json) {
      if (suppressLoad) return;
      try {
        board = normalizeBoard(JSON.parse(json));
        displays = [board.metadata.displayProfile];
        selectedDisplayID = board.metadata.displayProfile.id;
        boardsByDisplayID = { [selectedDisplayID]: clone(board) };
        undoStack.length = 0; redoStack.length = 0; selectedId = null; editorElementId = null; textEditor.style.display = 'none';
        renderDisplayRail();
        resizeCanvas();
      } catch (error) { post('error', { message: String(error) }, false); }
    }
    function loadContext(json) {
      if (suppressLoad) return;
      try {
        const context = JSON.parse(json);
        displays = Array.isArray(context.displays) && context.displays.length ? context.displays : [context.board?.metadata?.displayProfile || board.metadata.displayProfile];
        selectedDisplayID = context.selectedDisplayID && displays.some(display => display.id === context.selectedDisplayID)
          ? context.selectedDisplayID
          : (displays.find(display => display.isMain)?.id || displays[0].id);
        boardsByDisplayID = {};
        Object.entries(context.boardsByDisplayID || {}).forEach(([displayID, value]) => { boardsByDisplayID[displayID] = normalizeBoard(value); });
        if (context.board && !boardsByDisplayID[selectedDisplayID]) boardsByDisplayID[selectedDisplayID] = normalizeBoard(context.board);
        displays.forEach(display => { if (!boardsByDisplayID[display.id]) boardsByDisplayID[display.id] = blankBoard(display); });
        board = boardForDisplay(displayByID(selectedDisplayID));
        undoStack.length = 0; redoStack.length = 0; selectedId = null; editorElementId = null; textEditor.style.display = 'none';
        syncEnabled = false;
        renderDisplayRail();
        resizeCanvas();
        statusEl.textContent = `${displays.length} 块屏幕 · ${displayByID(selectedDisplayID).name || '当前屏幕'}`;
      } catch (error) { post('error', { message: String(error) }, false); }
    }
    document.querySelectorAll('[data-tool]').forEach(btn => btn.addEventListener('click', () => setTool(btn.dataset.tool)));
    document.getElementById('undo').addEventListener('click', undo);
    document.getElementById('redo').addEventListener('click', redo);
    newCanvasButton.addEventListener('click', newCanvasForSelectedDisplay);
    syncButton.addEventListener('click', syncDisplaysFromSelected);
    document.getElementById('save').addEventListener('click', save);
    document.getElementById('cancel').addEventListener('click', () => post('cancel', {}, false));
    window.addEventListener('resize', resizeCanvas);
    window.memoryWallLoadBoard = loadBoard;
    window.memoryWallLoadContext = loadContext;
    window.memoryWallRequestExport = save;
    if (window.__memoryWallNativeContextJSON) loadContext(window.__memoryWallNativeContextJSON);
    else if (window.__memoryWallNativeBoardJSON) loadBoard(window.__memoryWallNativeBoardJSON);
    document.fonts.ready.then(() => { statusEl.textContent = `${displays.length} 块屏幕 · ${board.canvasWidth}×${board.canvasHeight}`; post('ready', { fontReady: true, fontFamily: FONT }, false); resizeCanvas(); renderDisplayRail(); }).catch(error => post('error', { message: String(error) }, false));
    resizeCanvas();
  </script>
</body>
</html>
